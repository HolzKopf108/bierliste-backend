spring.application.name=backend
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=update

server.port=8080

spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true

spring.mail.host=${MAIL_HOST}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.api-key=${MAIL_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# spring.mail.properties.mail.debug=true

app.jwt.secret=${JWT_SECRET}
# 15 Minuten
app.jwt.access-exp-ms=900000
# 180 Tage
app.jwt.refresh-exp-ms=15552000000
app.counter.undo-window=PT5S
app.verif-exp-minutes=30
app.cleanup.cron=0 0 3 * * *
app.cleanup.unverified-user-max-age=P7D
app.deep-link-scheme=bierliste

google.client-id=${GOOGLE_CLIENT_ID}
